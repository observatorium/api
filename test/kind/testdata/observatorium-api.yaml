# RBAC Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: rbac-config
  namespace: proxy
data:
  rbac.yaml: |
    roles:
    - name: read-write
      resources:
      - metrics
      - logs
      tenants:
      - auth-tenant
      permissions:
      - read
      - write
    - name: read
      resources:
      - metrics
      - logs
      tenants:
      - auth-tenant
      permissions:
      - read
    - name: write
      resources:
      - metrics
      - logs
      tenants:
      - auth-tenant
      permissions:
      - write
    roleBindings:
    - name: admin-user
      roles:
      - read-write
      subjects:
      - kind: user
        name: admin@example.com
    - name: test-user
      roles:
      - read
      subjects:
      - kind: user
        name: test@example.com
    - name: admin-client
      roles:
      - write
      subjects:
      - kind: user
        name: admin-client
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: observatorium-api
  namespace: proxy
  labels:
    app: observatorium-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observatorium-api
  template:
    metadata:
      labels:
        app: observatorium-api
    spec:
      containers:
      - name: observatorium-api
        image: observatorium-api-auth-test:latest
        imagePullPolicy: Never
        ports:
        - name: http
          containerPort: 8080
        - name: internal
          containerPort: 8081
        args:
        - --web.listen=0.0.0.0:8080
        - --web.internal.listen=0.0.0.0:8081
        - --tls.server.cert-file=/etc/server-certs/tls.crt
        - --tls.server.key-file=/etc/server-certs/tls.key
        - --tls.client-auth-type=RequestClientCert
        - --web.healthchecks.url=http://localhost:8081
        - --tenants.config=/etc/config/tenants.yaml
        - --rbac.config=/etc/config/rbac.yaml
        - --metrics.read.endpoint=http://api-proxy.proxy.svc.cluster.local
        - --metrics.write.endpoint=http://api-proxy.proxy.svc.cluster.local
        - --logs.read.endpoint=http://api-proxy.proxy.svc.cluster.local
        - --logs.write.endpoint=http://api-proxy.proxy.svc.cluster.local
        - --log.level=debug
        volumeMounts:
        - name: server-certs
          mountPath: /etc/server-certs
          readOnly: true
        - name: ca-cert
          mountPath: /etc/certs
          readOnly: true
        - name: tenant-config
          mountPath: /etc/config/tenants.yaml
          readOnly: true
          subPath: tenants.yaml
        - name: rbac-config
          mountPath: /etc/config/rbac.yaml
          readOnly: true
          subPath: rbac.yaml
        env:
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      volumes:
      - name: server-certs
        secret:
          secretName: server-cert
      - name: ca-cert
        configMap:
          name: ca-cert-config
      - name: tenant-config
        configMap:
          name: tenant-config
      - name: rbac-config
        configMap:
          name: rbac-config
