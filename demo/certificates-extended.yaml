  namespace: proxy
spec:
  secretName: write-user-cert
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
  commonName: write@example.com
  dnsNames:
  - write@example.com
  subject:
    organizationalUnits:
    - "write-users"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: logs-reader-cert
  namespace: proxy
spec:
