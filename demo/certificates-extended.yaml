apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: query-user-cert
  namespace: proxy
spec:
  secretName: query-user-cert
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
  commonName: query@example.com
  dnsNames:
  - query@example.com
  subject:
    organizationalUnits:
    - "query-users"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
