roles:
- name: admin-role
  resources:
  - metrics
  - logs
  - traces
  tenants:
  - tenant-a
  - tenant-b
  permissions:
  - read
  - write
  paths:
  - /api/metrics/v1/*
  - /api/logs/v1/*
  - /api/traces/v1/*

- name: readonly-role
  resources:
  - metrics
  - logs
  tenants:
  - tenant-a
  permissions:
  - read
  paths:
  - /api/metrics/v1/query
  - /api/metrics/v1/query_range
  - /api/metrics/v1/series
  - /api/metrics/v1/labels
  - /api/logs/v1/query
  - /api/logs/v1/query_range

- name: metrics-only-role
  resources:
  - metrics
  tenants:
  - tenant-b
  permissions:
  - read
  - write
  paths:
  - /api/metrics/v1/*

- name: query-only-role
  resources:
  - metrics
  tenants:
  - tenant-a
  permissions:
  - read
  paths:
  - /api/metrics/v1/query
  - /api/metrics/v1/query_range

- name: write-only-role
  resources:
  - metrics
  tenants:
  - tenant-b
  permissions:
  - write
  paths:
  - /api/metrics/v1/receive

- name: logs-readonly-role
  resources:
  - logs
  tenants:
  - tenant-a
  - tenant-b
  permissions:
  - read
  paths:
  - /api/logs/v1/query
  - /api/logs/v1/query_range
  - /api/logs/v1/labels

roleBindings:
- name: admin-binding
  roles:
  - admin-role
  subjects:
  - kind: user
    name: admin@example.com

- name: test-readonly-binding
  roles:
  - readonly-role
  subjects:
  - kind: user
    name: test@example.com

- name: metrics-user-binding
  roles:
  - metrics-only-role
  subjects:
  - kind: user
    name: metrics@example.com

- name: query-user-binding
  roles:
  - query-only-role
  subjects:
  - kind: user
    name: query@example.com

- name: write-user-binding
  roles:
  - write-only-role
  subjects:
  - kind: user
    name: write@example.com

- name: logs-readonly-binding
  roles:
  - logs-readonly-role
  subjects:
  - kind: user
    name: logs-reader@example.com