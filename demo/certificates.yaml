apiVersion: v1
kind: Namespace
metadata:
  name: proxy
---
# Server TLS Certificate for Observatorium API
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: observatorium-server-tls
  namespace: proxy
spec:
  secretName: observatorium-server-tls
  commonName: observatorium-api.proxy.svc.cluster.local
  dnsNames:
  - observatorium-api
  - observatorium-api.proxy
  - observatorium-api.proxy.svc
  - observatorium-api.proxy.svc.cluster.local
  - localhost
  ipAddresses:
  - 127.0.0.1
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
  usages:
  - digital signature
  - key encipherment
  - server auth
---
# Client Certificate for Admin User
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: admin-client-cert
  namespace: proxy
spec:
  secretName: admin-client-cert
  commonName: "admin@example.com"
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
  usages:
  - digital signature
  - key encipherment
  - client auth
  subject:
    organizationalUnits:
    - admins
---
# Client Certificate for Test User
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test-client-cert
  namespace: proxy
spec:
  secretName: test-client-cert
  commonName: "test@example.com"
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
  usages:
  - digital signature
  - key encipherment
  - client auth
  subject:
    organizationalUnits:
    - users